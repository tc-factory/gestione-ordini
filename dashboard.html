<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionale Ordini — T&C Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner" id="header-root"></div>
    </header>

    <main class="app-main">
      <div class="stat-grid" id="stats-root"></div>
      <div id="dtf-planner-root"></div>
      <div id="orderlist-root"></div>
    </main>
  </div>

  <button class="fab" aria-label="Nuovo ordine" onclick="openOrderForm()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div id="order-form-modal" class="modal-overlay"></div>
  <div id="order-detail-modal" class="modal-overlay"></div>
  <div id="day-modal" class="modal-overlay"></div>
  <div id="settings-modal" class="modal-overlay"></div>
  <div id="file-preview-modal" class="modal-overlay"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    Theme.init();
    TCFactory.onUpdate(() => renderApp());
    TCFactory.init().then(() => renderApp());
  </script>
</body>
</html>
